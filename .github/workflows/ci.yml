name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
